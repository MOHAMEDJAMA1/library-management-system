version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: library_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d library"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: library_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/library
      - SECRET_KEY=super_secret_library_key_12345!@#$$%
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: library_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
